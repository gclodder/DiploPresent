# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "DIPLOPRESENT 3"

[setup]
script = ""

[[actions]]
name = "Start localhost"
icon = "tool"
command = "npm run dev"

[[actions]]
name = "Build, push, commit en maak zip-file"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

function Run-Checked {
  param([string]$Command)
  Invoke-Expression $Command
  if ($LASTEXITCODE -ne 0) {
    throw "Command failed: $Command"
  }
}

$timestamp = Get-Date -Format "yyyyMMdd-HHmm"
$package = Get-Content package.json -Raw | ConvertFrom-Json
$version = $package.version
$zipName = "DiploPresent $version - $timestamp.zip"

Run-Checked "git switch main"
Run-Checked "npm run build"

$changes = git status --porcelain
if ($changes) {
  Run-Checked "git add -A"
  Run-Checked "git commit -m `"Release $version - $timestamp`""
  Run-Checked "git push origin main"
} else {
  Write-Host "Geen wijzigingen om te committen."
}

if (Test-Path $zipName) {
  throw "Zip bestaat al: $zipName"
}

Compress-Archive -Path "dist\*" -DestinationPath $zipName -CompressionLevel Optimal
Write-Host "Klaar: $zipName"'''
